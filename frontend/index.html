<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Artisan Buddy</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
.brand{font-size:34px;font-weight:800;color:#7a1212;display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.tagline{font-size:14px;color:#888;margin-bottom:3rem;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.5rem;max-width:680px;width:100%;}
.box{background:#fff;border:1.5px solid #e8d8d8;border-radius:18px;padding:2rem 1.5rem;display:flex;flex-direction:column;align-items:center;gap:10px;text-decoration:none;cursor:pointer;transition:all .15s;}
.box i{font-size:34px;color:#7a1212;}
.box-title{font-size:17px;font-weight:700;color:#111;}
.box-sub{font-size:12px;color:#999;text-align:center;}
.box.active:hover{border-color:#7a1212;box-shadow:0 6px 18px rgba(122,18,18,.12);transform:translateY(-2px);}
.box.disabled{opacity:.45;cursor:not-allowed;}
.soon{font-size:10px;background:#f5e9e9;color:#7a1212;padding:2px 8px;border-radius:100px;font-weight:600;margin-top:2px;}
@media (max-width:560px){.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="brand"><i class="ti ti-feather"></i> Artisan Buddy</div>
<div class="tagline">Your toolkit for running a handmade business</div>
<div class="grid">
  <a class="box active" href="pricebuddy.html">
    <i class="ti ti-tag"></i>
    <div class="box-title">Price Buddy</div>
    <div class="box-sub">Get a fair price for your product</div>
  </a>
  <a class="box active" href="designbuddy.html">
    <i class="ti ti-palette"></i>
    <div class="box-title">Design Buddy</div>
    <div class="box-sub">Design help for your craft</div>
  </a>
  <a class="box active" href="businessbuddy.html">
    <i class="ti ti-briefcase"></i>
    <div class="box-title">Business Buddy</div>
    <div class="box-sub">Grow and manage your business</div>
  </a>
  <div class="box active">
    <i class="ti ti-chart-line"></i>
    <div class="box-title">Market Buddy</div>
    <div class="box-sub">Understand your market</div>
  </div>
</div>
</body>
</html>
